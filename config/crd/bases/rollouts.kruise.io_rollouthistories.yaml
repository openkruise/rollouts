
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.7.0
  creationTimestamp: null
  name: rollouthistories.rollouts.kruise.io
spec:
  group: rollouts.kruise.io
  names:
    kind: RolloutHistory
    listKind: RolloutHistoryList
    plural: rollouthistories
    singular: RH
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RolloutHistory is the Schema for the rollouthistories API
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: RolloutHistorySpec defines the desired state of RolloutHistory
            properties:
              objectRef:
                description: ObjectRef indicates workload
                properties:
                  workloadRef:
                    description: WorkloadRef contains enough information to let you
                      identify a workload for Rollout Batch release of the bypass
                    properties:
                      apiVersion:
                        description: API Version of the referent
                        type: string
                      kind:
                        description: Kind of the referent
                        type: string
                      name:
                        description: Name of the referent
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                type: object
              releasetype:
                description: RealseType should be "batchRelease" or "rolloutRelease"
                type: string
              rolloutID:
                description: RolloutID should be changed before each workload revision
                  publication. It is to distinguish consecutive multiple workload
                  publications and rollout progress.
                type: string
              stepnum:
                description: StepNum indicates how many steps this rollout is
                format: int64
                type: integer
              steps:
                description: Steps define the order of phases to execute release in
                  batches(20%, 40%, 60%, 80%, 100%)
                items:
                  description: CanaryStep defines a step of a canary workload.
                  properties:
                    pause:
                      description: Pause defines a pause stage for a rollout, manual
                        or auto
                      properties:
                        duration:
                          description: Duration the amount of time to wait before
                            moving to the next step.
                          format: int32
                          minimum: 0
                          type: integer
                      type: object
                    replicas:
                      anyOf:
                      - type: integer
                      - type: string
                      description: 'Replicas is the number of expected canary pods
                        in this batch it can be an absolute number (ex: 5) or a percentage
                        of total pods.'
                      x-kubernetes-int-or-string: true
                    weight:
                      format: int32
                      maximum: 100
                      minimum: 1
                      type: integer
                  type: object
                type: array
              trafficRoutings:
                description: TrafficRoutings hosts all the supported service meshes
                  supported to enable more fine-grained traffic routing todo current
                  only support one TrafficRouting
                items:
                  description: TrafficRouting hosts all the different configuration
                    for supported service meshes to enable more fine-grained traffic
                    routing
                  properties:
                    gateway:
                      description: Gateway holds Gateway specific configuration to
                        route traffic Gateway configuration only supports >= v0.4.0
                        (v1alpha2).
                      properties:
                        httpRouteName:
                          description: HTTPRouteName refers to the name of an `HTTPRoute`
                            resource in the same namespace as the `Rollout`
                          type: string
                      type: object
                    gracePeriodSeconds:
                      description: Optional duration in seconds the traffic provider(e.g.

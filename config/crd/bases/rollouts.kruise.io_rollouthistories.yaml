                            e.g. Nginx. Default is Nginx
                          type: string
                        name:
                          description: Name refers to the name of an `Ingress` resource
                            in the same namespace as the `Rollout`
                          type: string
                      required:
                      - name
                      type: object
                    service:
                      description: Service holds the name of a service which selects

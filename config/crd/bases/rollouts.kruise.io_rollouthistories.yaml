                          ip:
                            description: IP indicates the pod ip
                            type: string
                          name:
                            description: Name indicates the node name
                            type: string
                          node:
                            description: Node indicates the node which pod is located
                              at
                            type: string
                        type: object
                      type: array
                  type: object
                type: array
              rhphase:
                description: RHPhase indicates state of this rollout revision, such
                  as "init", "paused", "ready", "wait", "completed".
                type: string
            required:
            - rhphase
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
